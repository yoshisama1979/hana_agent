# merchant_rules.yml
# りそなデビット明細の「利用内容」から勘定科目を自動推定するルール
#
# match:   正規表現（大文字小文字・全角半角を正規化後にマッチング）
# 入力名:  MFクラウドに入力する利用内容の名称
# 勘定科目: MFクラウドの勘定科目名
# 補助科目: MFクラウドの補助科目名（任意）
# 税区分:  課税仕入 / 対象外 / 非課税仕入
# メモ:    備考（任意）

rules:

  # ──────────────────────────────────────────
  # クラウド・サーバー費
  # ──────────────────────────────────────────
  - match: "エックスサーバー|XSERVER"
    入力名: エックスサーバー
    勘定科目: 通信費
    補助科目: サーバー
    税区分: 課税仕入

  - match: "ｻｸﾗｲﾝﾀ-ﾈﾂﾄ|さくらインターネット|SAKURA"
    入力名: さくらインターネット
    勘定科目: 通信費
    補助科目: サーバー
    税区分: 課税仕入

  - match: "ムームードメイン|MUUMUU"
    入力名: ムームードメイン
    勘定科目: 通信費
    補助科目: ドメイン
    税区分: 課税仕入

  - match: "AMAZON WEB SERVICES|ＡＭＡＺＯＮ　ＷＥＢ　ＳＥＲＶＩＣＥＳ|AWS"
    入力名: Amazon Web Services
    勘定科目: 通信費
    補助科目: サーバー
    税区分: 課税仕入

  - match: 'GOOGLE.*CLOUD'
    入力名: Google Cloud
    勘定科目: 通信費
    補助科目: サービス利用料
    税区分: 課税仕入

  # ──────────────────────────────────────────
  # ソフトウェア・SaaSライセンス
  # ──────────────────────────────────────────
