  - match: "ホルモン|ﾔｷﾆｸ|焼肉|なごやか亭|まるしげ|まる天満橋|炭火焼|HUB|Beer Thirty|BEER.*THIRTY|鳥貴|来来亭|かに道楽|和楽|バルチカ|BARNORD"
