    入力名: Zoom
    勘定科目: 通信費
    補助科目: サービス利用料
    税区分: 課税仕入

  - match: "CURSOR"
    入力名: Cursor
    勘定科目: 通信費
    補助科目: サービス利用料
    税区分: 課税仕入

  - match: "ATLASSIAN"
    入力名: Atlassian
    勘定科目: 通信費
    補助科目: サービス利用料
