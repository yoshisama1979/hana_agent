# merchant_rules.yml
# りそなデビット明細の「利用内容」から勘定科目を自動推定するルール
#
# match: 正規表現（大文字小文字・全角半角を正規化後にマッチング）
# 勘定科目: freee の勘定科目名
# 補助科目: freee の補助科目名（任意）
# 税区分: 課税仕入 / 対象外 / 非課税仕入
# メモ: 備考（任意）

rules:

  # ──────────────────────────────────────────
  # クラウド・サーバー費
  # ──────────────────────────────────────────
  - match: "エックスサーバー|XSERVER"
    勘定科目: 通信費
    補助科目: エックスサーバー
    税区分: 課税仕入

  - match: "ｻｸﾗｲﾝﾀ-ﾈﾂﾄ|さくらインターネット|SAKURA"
    勘定科目: 通信費
    補助科目: さくらインターネット
    税区分: 課税仕入

  - match: "ムームードメイン|MUUMUU"
    勘定科目: 通信費
    補助科目: ムームードメイン
    税区分: 課税仕入

  - match: "AMAZON WEB SERVICES|ＡＭＡＺＯＮ　ＷＥＢ　ＳＥＲＶＩＣＥＳ|AWS"
    勘定科目: 通信費
    補助科目: AWS
    税区分: 課税仕入

  - match: "GOOGLE\*CLOUD|GOOGLE.*CLOUD"
    勘定科目: 通信費
    補助科目: GCP
    税区分: 課税仕入

  # ──────────────────────────────────────────
  # ソフトウェア・SaaSライセンス（消耗品費）
  # ──────────────────────────────────────────
  - match: "ZOOM"
    勘定科目: 消耗品費
    補助科目: Zoom
    税区分: 課税仕入

  - match: "CURSOR"
    勘定科目: 消耗品費
    補助科目: Cursor
    税区分: 課税仕入

  - match: "ATLASSIAN"
    勘定科目: 消耗品費
    補助科目: Atlassian
    税区分: 課税仕入

  - match: "GITHUB"
    勘定科目: 消耗品費
    補助科目: GitHub
    税区分: 課税仕入

  - match: "NOTION"
    勘定科目: 消耗品費
    補助科目: Notion
    税区分: 課税仕入

  - match: "TODOIST"
    勘定科目: 消耗品費
    補助科目: Todoist
    税区分: 課税仕入

  - match: "FIGMA"
    勘定科目: 消耗品費
    補助科目: Figma
    税区分: 課税仕入

  - match: "TINY TECHNOLOGIES"
    勘定科目: 消耗品費
    補助科目: Fathom Analytics
    税区分: 課税仕入

  - match: "AWESOME SCREENSHOT"
    勘定科目: 消耗品費
    補助科目: Awesome Screenshot
    税区分: 課税仕入

  - match: "FLATICON"
    勘定科目: 消耗品費
    補助科目: Flaticon
    税区分: 課税仕入

  - match: "AQUA VOICE"
    勘定科目: 消耗品費
    補助科目: Aqua Voice
    税区分: 課税仕入

  - match: "Dropbox"
    勘定科目: 消耗品費
    補助科目: Dropbox
    税区分: 課税仕入

  - match: "ﾏｲｸﾛｿﾌﾄ|MICROSOFT|ＭＩＣＲＯＳＯＦＴ"
    勘定科目: 消耗品費
    補助科目: Microsoft
    税区分: 課税仕入

  # ──────────────────────────────────────────
  # AIツール（消耗品費）
  # ──────────────────────────────────────────
