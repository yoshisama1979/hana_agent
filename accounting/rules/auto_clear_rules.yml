# 自動消し込みルール（F-06）
#
# MFクラウドの銀行口座連携で自動入力された明らかに正しい仕訳を一括消化する。
# 各ルールの条件はすべて任意で、指定された条件のみ AND 結合で判定される。
#
# サポート条件：
#   借方勘定科目 / 貸方勘定科目  : 完全一致
#   借方補助科目 / 貸方補助科目  : 完全一致
#   借方金額    / 貸方金額       : 整数完全一致（金額が一定でない場合は省略）
#   摘要正規表現                 : 部分一致

rules:
  - name: 振込手数料
    借方勘定科目: 支払手数料
    貸方勘定科目: 普通預金
    摘要正規表現: 振込手数料
